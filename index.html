<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorting Algorithm Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --surface2:  #16213e;
      --border:    #2a2a4a;
      --text:      #e0e0f0;
      --text-dim:  #8888aa;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --compare:   #facc15;
      --swap:      #fb7185;
      --radius:    10px;
      --panel-h:   180px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: .04em;
      background: linear-gradient(90deg, var(--accent2), var(--compare));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    #algo-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent2);
      margin-left: 4px;
    }

    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 24px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .stat-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-dim);
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      min-width: 6ch;
      text-align: right;
    }

    #cmp-count  { color: var(--compare); }
    #swap-count { color: var(--swap); }

    /* ── Controls Panel ── */
    .controls {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px 28px;
      flex-shrink: 0;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ctrl-group label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-dim);
    }

    select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: .9rem;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    select:focus { border-color: var(--accent); }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 130px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent2);
      cursor: pointer;
      transition: transform .15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent2);
      cursor: pointer;
      border: none;
    }

    .slider-val {
      font-size: .8rem;
      color: var(--text-dim);
      min-width: 3ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      padding: 7px 18px;
      border-radius: 6px;
      border: none;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .03em;
      transition: opacity .15s, transform .1s, box-shadow .15s;
    }
    button:active { transform: scale(.96); }
    button:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    #btn-run {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 14px rgba(108,99,255,.4);
    }
    #btn-run:not(:disabled):hover { box-shadow: 0 0 22px rgba(108,99,255,.7); }

    #btn-step {
      background: var(--surface);
      color: var(--accent2);
      border: 1px solid var(--accent);
    }
    #btn-step:not(:disabled):hover { background: var(--accent); color: #fff; }

    #btn-stop {
      background: var(--surface);
      color: var(--swap);
      border: 1px solid var(--swap);
    }
    #btn-stop:not(:disabled):hover { background: var(--swap); color: #fff; }

    #btn-reset {
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    #btn-reset:hover { border-color: var(--accent2); color: var(--text); }

    /* ── Visualizer ── */
    #viz {
      flex: 1;
      display: flex;
      align-items: flex-end;
      padding: 12px 16px 0;
      gap: 1px;
      overflow: hidden;
      position: relative;
    }

    .bar {
      flex: 1;
      height: 100%;
      transform-origin: bottom center;
      border-radius: 2px 2px 0 0;
      transition: background-color .08s;
      min-width: 2px;
      position: relative;
    }

    .bar.comparing {
      box-shadow: 0 0 0 2px var(--compare), 0 0 12px var(--compare);
      z-index: 2;
    }

    .bar.swapping {
      box-shadow: 0 0 0 2px var(--swap), 0 0 14px var(--swap);
      z-index: 3;
    }

    /* Sorted glow */
    .bar.sorted {
      filter: brightness(1.15);
    }

    /* Status overlay */
    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 20px var(--accent2);
      pointer-events: none;
      opacity: 0;
      transition: opacity .4s;
    }
    #status.visible { opacity: 1; }

    /* Footer info */
    #footer-info {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 6px 24px;
      font-size: .72rem;
      color: var(--text-dim);
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }

    #footer-info span { font-weight: 500; color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>Sort<span style="-webkit-text-fill-color:var(--text-dim);background:none;">Vis</span></h1>
  <div id="algo-label">Bubble Sort</div>
  <div class="header-stats">
    <div class="stat">
      <span class="stat-label">Comparisons</span>
      <span class="stat-value" id="cmp-count">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Swaps</span>
      <span class="stat-value" id="swap-count">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Array Size</span>
      <span class="stat-value" id="size-display">60</span>
    </div>
  </div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label for="algo-select">Algorithm</label>
    <select id="algo-select">
      <option value="bubble">Bubble Sort</option>
      <option value="selection">Selection Sort</option>
      <option value="insertion">Insertion Sort</option>
      <option value="merge">Merge Sort</option>
      <option value="quick">Quick Sort</option>
      <option value="heap">Heap Sort</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label for="size-slider">Array Size</label>
    <div class="slider-wrap">
      <input type="range" id="size-slider" min="10" max="200" value="60" />
      <span class="slider-val" id="size-val">60</span>
    </div>
  </div>

  <div class="ctrl-group">
    <label for="speed-slider">Speed</label>
    <div class="slider-wrap">
      <input type="range" id="speed-slider" min="1" max="100" value="50" />
      <span class="slider-val" id="speed-val">50</span>
    </div>
  </div>

  <div class="btn-group">
    <button id="btn-run">Run</button>
    <button id="btn-step">Step</button>
    <button id="btn-stop" disabled>Stop</button>
    <button id="btn-reset">Shuffle</button>
  </div>
</div>

<div id="viz">
  <div id="status"></div>
</div>

<div id="footer-info">
  Comparing: <span style="color:var(--compare)">yellow glow</span>
  &nbsp;|&nbsp;
  Swapping: <span style="color:var(--swap)">pink glow</span>
  &nbsp;|&nbsp;
  Colors: <span>blue (low) → red (high)</span>
  &nbsp;|&nbsp;
  Sorted: <span>smooth gradient = done</span>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   State
═══════════════════════════════════════════════════════ */
let array        = [];
let bars         = [];
let generator    = null;
let running      = false;
let rafId        = null;
let comparisons  = 0;
let swaps        = 0;
let highlighted  = { comparing: [], swapping: [] };
let sortedSet    = new Set();
let done         = false;

const viz        = document.getElementById('viz');
const statusEl   = document.getElementById('status');
const algoSelect = document.getElementById('algo-select');
const sizeSlider = document.getElementById('size-slider');
const speedSlider= document.getElementById('speed-slider');
const sizeVal    = document.getElementById('size-val');
const speedVal   = document.getElementById('speed-val');
const sizeDisp   = document.getElementById('size-display');
const algoLabel  = document.getElementById('algo-label');
const cmpCount   = document.getElementById('cmp-count');
const swapCount  = document.getElementById('swap-count');
const btnRun     = document.getElementById('btn-run');
const btnStep    = document.getElementById('btn-step');
const btnStop    = document.getElementById('btn-stop');
const btnReset   = document.getElementById('btn-reset');

/* ═══════════════════════════════════════════════════════
   Color map: value rank → HSL hue (240 blue → 0 red)
═══════════════════════════════════════════════════════ */
function rankColor(rank, total) {
  // rank 0 = smallest → hue 240 (blue), rank n-1 = largest → hue 0 (red)
  const t   = rank / (total - 1);
  const hue = 240 - t * 240;   // 240..0
  const sat = 75 + t * 10;     // slight saturation increase for reds
  const lit = 45 + t * 8;      // slightly brighter reds
  return `hsl(${hue.toFixed(1)},${sat.toFixed(0)}%,${lit.toFixed(0)}%)`;
}

/* Pre-compute rank → color for current array size */
let colorMap = [];

function buildColorMap(n) {
  colorMap = [];
  for (let i = 0; i < n; i++) colorMap.push(rankColor(i, n));
}

/* Array value → color (values are rank indices 1..n) */
function colorForValue(v) {
  return colorMap[v - 1] || '#888';
}

/* ═══════════════════════════════════════════════════════
   Array & DOM init
═══════════════════════════════════════════════════════ */
function buildArray(n) {
  array = Array.from({ length: n }, (_, i) => i + 1);
  shuffle(array);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildBars() {
  // Remove old bars (keep status overlay)
  [...viz.querySelectorAll('.bar')].forEach(b => b.remove());
  bars = [];
  const n = array.length;

  for (let i = 0; i < n; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    viz.appendChild(bar);
    bars.push(bar);
  }
  renderBars();
}

function renderBars() {
  const n      = array.length;
  const maxVal = n; // values are 1..n

  for (let i = 0; i < n; i++) {
    const bar = bars[i];
    const v   = array[i];

    bar.style.transform       = 'scaleY(' + Math.max(0.005, v / maxVal) + ')';
    bar.style.backgroundColor = colorForValue(v);

    // Reset classes
    bar.className = 'bar';
  }

  // Apply highlights
  for (const idx of highlighted.comparing) {
    if (bars[idx]) bars[idx].classList.add('comparing');
  }
  for (const idx of highlighted.swapping) {
    if (bars[idx]) bars[idx].classList.add('swapping');
  }
  // Sorted
  for (const idx of sortedSet) {
    if (bars[idx]) bars[idx].classList.add('sorted');
  }
}

function resetCounters() {
  comparisons = 0;
  swaps       = 0;
  cmpCount.textContent  = '0';
  swapCount.textContent = '0';
  highlighted = { comparing: [], swapping: [] };
  sortedSet   = new Set();
  done        = false;
  hideStatus();
}

function updateCounters() {
  cmpCount.textContent  = comparisons.toLocaleString();
  swapCount.textContent = swaps.toLocaleString();
}

function showStatus(msg, color = 'var(--accent2)') {
  statusEl.textContent = msg;
  statusEl.style.color = color;
  statusEl.classList.add('visible');
}
function hideStatus() {
  statusEl.classList.remove('visible');
}

/* ═══════════════════════════════════════════════════════
   Generator yield protocol
   Each yield is an object: { type, indices, extra? }
   type: 'compare' | 'swap' | 'overwrite' | 'sorted' | 'done'
═══════════════════════════════════════════════════════ */

/* ─── Bubble Sort ─── */
function* bubbleSort(arr) {
  const n = arr.length;
  for (let i = 0; i < n - 1; i++) {
    for (let j = 0; j < n - i - 1; j++) {
      yield { type: 'compare', indices: [j, j + 1] };
      comparisons++;
      updateCounters();
      if (arr[j] > arr[j + 1]) {
        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
        swaps++;
        updateCounters();
        yield { type: 'swap', indices: [j, j + 1] };
      }
    }
    sortedSet.add(n - 1 - i);
    yield { type: 'sorted', indices: [n - 1 - i] };
  }
  sortedSet.add(0);
  yield { type: 'done' };
}

/* ─── Selection Sort ─── */
function* selectionSort(arr) {
  const n = arr.length;
  for (let i = 0; i < n - 1; i++) {
    let minIdx = i;
    for (let j = i + 1; j < n; j++) {
      yield { type: 'compare', indices: [minIdx, j] };
      comparisons++;
      updateCounters();
      if (arr[j] < arr[minIdx]) minIdx = j;
    }
    if (minIdx !== i) {
      [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
      swaps++;
      updateCounters();
      yield { type: 'swap', indices: [i, minIdx] };
    }
    sortedSet.add(i);
    yield { type: 'sorted', indices: [i] };
  }
  sortedSet.add(n - 1);
  yield { type: 'done' };
}

/* ─── Insertion Sort ─── */
function* insertionSort(arr) {
  const n = arr.length;
  sortedSet.add(0);
  for (let i = 1; i < n; i++) {
    const key = arr[i];
    let j = i - 1;
    yield { type: 'compare', indices: [i, j] };
    comparisons++;
    updateCounters();
    while (j >= 0 && arr[j] > key) {
      arr[j + 1] = arr[j];
      swaps++;
      updateCounters();
      yield { type: 'swap', indices: [j + 1, j] };
      j--;
      if (j >= 0) {
        yield { type: 'compare', indices: [j + 1, j] };
        comparisons++;
        updateCounters();
      }
    }
    arr[j + 1] = key;
    sortedSet.add(i);
    yield { type: 'sorted', indices: [i] };
  }
  yield { type: 'done' };
}

/* ─── Merge Sort ─── */
function* mergeSort(arr) {
  yield* mergeSortHelper(arr, 0, arr.length - 1);
  for (let i = 0; i < arr.length; i++) sortedSet.add(i);
  yield { type: 'done' };
}

function* mergeSortHelper(arr, l, r) {
  if (l >= r) return;
  const m = (l + r) >> 1;
  yield* mergeSortHelper(arr, l, m);
  yield* mergeSortHelper(arr, m + 1, r);
  yield* merge(arr, l, m, r);
}

function* merge(arr, l, m, r) {
  const left  = arr.slice(l, m + 1);
  const right = arr.slice(m + 1, r + 1);
  let i = 0, j = 0, k = l;

  while (i < left.length && j < right.length) {
    yield { type: 'compare', indices: [l + i, m + 1 + j] };
    comparisons++;
    updateCounters();
    if (left[i] <= right[j]) {
      arr[k] = left[i++];
    } else {
      arr[k] = right[j++];
    }
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [k] };
    k++;
  }
  while (i < left.length) {
    arr[k] = left[i++];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [k++] };
  }
  while (j < right.length) {
    arr[k] = right[j++];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [k++] };
  }
  for (let x = l; x <= r; x++) sortedSet.add(x);
}

/* ─── Quick Sort ─── */
function* quickSort(arr) {
  yield* quickSortHelper(arr, 0, arr.length - 1);
  for (let i = 0; i < arr.length; i++) sortedSet.add(i);
  yield { type: 'done' };
}

function* quickSortHelper(arr, lo, hi) {
  if (lo >= hi) { if (lo === hi) sortedSet.add(lo); return; }
  yield* partition(arr, lo, hi);
}

function* partition(arr, lo, hi) {
  // Median-of-three pivot
  const mid = (lo + hi) >> 1;
  yield { type: 'compare', indices: [lo, mid] };
  comparisons++;
  updateCounters();
  if (arr[lo] > arr[mid]) { [arr[lo], arr[mid]] = [arr[mid], arr[lo]]; swaps++; updateCounters(); yield { type: 'swap', indices: [lo, mid] }; }
  yield { type: 'compare', indices: [lo, hi] };
  comparisons++;
  updateCounters();
  if (arr[lo] > arr[hi])  { [arr[lo], arr[hi]]  = [arr[hi],  arr[lo]]; swaps++; updateCounters(); yield { type: 'swap', indices: [lo, hi] }; }
  yield { type: 'compare', indices: [mid, hi] };
  comparisons++;
  updateCounters();
  if (arr[mid] > arr[hi]) { [arr[mid], arr[hi]] = [arr[hi], arr[mid]]; swaps++; updateCounters(); yield { type: 'swap', indices: [mid, hi] }; }

  const pivot = arr[mid];
  [arr[mid], arr[hi - 1]] = [arr[hi - 1], arr[mid]];
  swaps++; updateCounters();
  yield { type: 'swap', indices: [mid, hi - 1] };

  let i = lo, j = hi - 1;
  while (true) {
    do {
      i++;
      yield { type: 'compare', indices: [i, hi - 1] };
      comparisons++;
      updateCounters();
    } while (arr[i] < pivot);
    do {
      j--;
      yield { type: 'compare', indices: [j, hi - 1] };
      comparisons++;
      updateCounters();
    } while (j > lo && arr[j] > pivot);
    if (i >= j) break;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [i, j] };
  }
  [arr[i], arr[hi - 1]] = [arr[hi - 1], arr[i]];
  swaps++;
  updateCounters();
  yield { type: 'swap', indices: [i, hi - 1] };

  const p = i;
  sortedSet.add(p);
  yield* quickSortHelper(arr, lo, p - 1);
  yield* quickSortHelper(arr, p + 1, hi);
}

/* ─── Heap Sort ─── */
function* heapSort(arr) {
  const n = arr.length;

  // Build max heap
  for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
    yield* heapify(arr, n, i);
  }

  for (let i = n - 1; i > 0; i--) {
    [arr[0], arr[i]] = [arr[i], arr[0]];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [0, i] };
    sortedSet.add(i);
    yield { type: 'sorted', indices: [i] };
    yield* heapify(arr, i, 0);
  }
  sortedSet.add(0);
  yield { type: 'done' };
}

function* heapify(arr, n, i) {
  let largest = i;
  const l = 2 * i + 1;
  const r = 2 * i + 2;

  if (l < n) {
    yield { type: 'compare', indices: [l, largest] };
    comparisons++;
    updateCounters();
    if (arr[l] > arr[largest]) largest = l;
  }
  if (r < n) {
    yield { type: 'compare', indices: [r, largest] };
    comparisons++;
    updateCounters();
    if (arr[r] > arr[largest]) largest = r;
  }
  if (largest !== i) {
    [arr[i], arr[largest]] = [arr[largest], arr[i]];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [i, largest] };
    yield* heapify(arr, n, largest);
  }
}

/* ═══════════════════════════════════════════════════════
   Generator map
═══════════════════════════════════════════════════════ */
const ALGOS = {
  bubble:    { name: 'Bubble Sort',    fn: bubbleSort    },
  selection: { name: 'Selection Sort', fn: selectionSort },
  insertion: { name: 'Insertion Sort', fn: insertionSort },
  merge:     { name: 'Merge Sort',     fn: mergeSort     },
  quick:     { name: 'Quick Sort',     fn: quickSort     },
  heap:      { name: 'Heap Sort',      fn: heapSort      },
};

/* ═══════════════════════════════════════════════════════
   Runner
═══════════════════════════════════════════════════════ */
function getDelay() {
  // speed 1 → ~500ms, speed 100 → ~0ms (rAF)
  const s = parseInt(speedSlider.value, 10);
  if (s >= 99) return 0;
  // Exponential: fast at high end
  return Math.round(500 * Math.pow(1 - s / 100, 2.2));
}

function applyStep(result) {
  if (!result || result.done) {
    finishSort();
    return false;
  }

  const { type, indices } = result.value;
  highlighted = { comparing: [], swapping: [] };

  switch (type) {
    case 'compare':
      highlighted.comparing = indices;
      break;
    case 'swap':
      highlighted.swapping = indices;
      break;
    case 'sorted':
      // indices already added to sortedSet by algorithm
      break;
    case 'done':
      finishSort();
      return false;
  }

  renderBars();
  return true;
}

function stepOnce() {
  if (!generator || done) return;
  const result = generator.next();
  return applyStep(result);
}

function finishSort() {
  running = false;
  done    = true;
  if (rafId) { clearTimeout(rafId); rafId = null; }
  highlighted = { comparing: [], swapping: [] };
  // Mark all as sorted
  for (let i = 0; i < array.length; i++) sortedSet.add(i);
  renderBars();
  showStatus('Sorted!', 'var(--compare)');
  setUIState('done');
}

function runLoop() {
  if (!running) return;
  const more = stepOnce();
  if (more === false) return;
  const delay = getDelay();
  if (delay === 0) {
    rafId = requestAnimationFrame(runLoop);
  } else {
    rafId = setTimeout(runLoop, delay);
  }
}

function startRun() {
  if (done) resetAndInit();
  if (!generator) initGenerator();
  running = true;
  setUIState('running');
  runLoop();
}

function stopRun() {
  running = false;
  if (rafId) { clearTimeout(rafId); cancelAnimationFrame(rafId); rafId = null; }
  setUIState('paused');
}

function initGenerator() {
  const key = algoSelect.value;
  generator  = ALGOS[key].fn(array);
}

function resetAndInit() {
  stopRun();
  resetCounters();
  const n = parseInt(sizeSlider.value, 10);
  buildColorMap(n);
  buildArray(n);
  buildBars();
  generator = null;
  setUIState('idle');
}

/* ═══════════════════════════════════════════════════════
   UI state
═══════════════════════════════════════════════════════ */
function setUIState(state) {
  // states: idle | running | paused | done
  btnRun.disabled   = (state === 'running');
  btnStep.disabled  = (state === 'running' || state === 'done');
  btnStop.disabled  = (state !== 'running');
  btnReset.disabled = false;
}

/* ═══════════════════════════════════════════════════════
   Event listeners
═══════════════════════════════════════════════════════ */
btnRun.addEventListener('click', () => {
  if (done) resetAndInit();
  startRun();
});

btnStep.addEventListener('click', () => {
  if (done) return;
  if (!generator) { initGenerator(); setUIState('paused'); }
  const more = stepOnce();
  if (more === false) return;
  setUIState('paused');
});

btnStop.addEventListener('click', stopRun);

btnReset.addEventListener('click', resetAndInit);

algoSelect.addEventListener('change', () => {
  algoLabel.textContent = ALGOS[algoSelect.value].name;
  resetAndInit();
});

sizeSlider.addEventListener('input', () => {
  const n = parseInt(sizeSlider.value, 10);
  sizeVal.textContent  = n;
  sizeDisp.textContent = n;
  resetAndInit();
});

speedSlider.addEventListener('input', () => {
  speedVal.textContent = speedSlider.value;
});

/* Resize: rebuild bars to fit new height */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!running) renderBars();
    else          renderBars();
  }, 60);
});

/* ═══════════════════════════════════════════════════════
   Boot
═══════════════════════════════════════════════════════ */
(function init() {
  const n = parseInt(sizeSlider.value, 10);
  sizeVal.textContent  = n;
  speedVal.textContent = speedSlider.value;
  sizeDisp.textContent = n;
  algoLabel.textContent = ALGOS[algoSelect.value].name;
  buildColorMap(n);
  buildArray(n);

  // Wait one frame so viz has its layout height
  requestAnimationFrame(() => {
    buildBars();
    setUIState('idle');
  });
})();
</script>
</body>
</html>
