<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SortVis — Dark Observatory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #060609;
      --glass-bg:     rgba(6, 6, 9, 0.80);
      --glass-border: rgba(255, 255, 255, 0.06);
      --gold:         #f0a030;
      --gold-dim:     rgba(240, 160, 48, 0.18);
      --gold-glow:    rgba(240, 160, 48, 0.45);
      --cyan:         #22d3ee;
      --cyan-glow:    rgba(34, 211, 238, 0.45);
      --pink:         #ec4899;
      --pink-glow:    rgba(236, 72, 153, 0.45);
      --text:         #e8e5f0;
      --text-mid:     #9994b0;
      --text-dim:     #5a566e;
      --blur:         blur(20px);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Background canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* All structural elements sit above the canvas */
    header,
    .controls,
    #viz,
    #footer-info {
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--glass-border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0;
      line-height: 1;
      white-space: nowrap;
    }

    .logo-sort {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .logo-vis {
      font-family: 'Syne', sans-serif;
      font-weight: 400;
      font-size: 1.3rem;
      color: var(--text-dim);
      letter-spacing: -0.01em;
    }

    .header-divider {
      width: 1px;
      height: 22px;
      background: var(--glass-border);
      flex-shrink: 0;
    }

    #algo-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 9999px;
      padding: 5px 14px 5px 12px;
    }

    .stat-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      min-width: 6ch;
      text-align: right;
      color: var(--text);
    }

    #cmp-count  { color: var(--cyan); }
    #swap-count { color: var(--pink); }
    #size-display { color: var(--text-mid); }

    /* ── Controls Panel ── */
    .controls {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--glass-border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px 28px;
      flex-shrink: 0;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .ctrl-group label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    /* Custom select wrapper */
    .select-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .select-wrap::after {
      content: '';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 6px;
      pointer-events: none;
      background: var(--text-mid);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
    }

    select {
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 7px 32px 7px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus {
      border-color: rgba(240, 160, 48, 0.4);
      box-shadow: 0 0 0 2px rgba(240, 160, 48, 0.08);
    }

    /* Range sliders */
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 130px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.10);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(240, 160, 48, 0.20), 0 0 10px var(--gold-glow);
      transition: box-shadow 0.15s, transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 4px rgba(240, 160, 48, 0.30), 0 0 18px var(--gold-glow);
      transform: scale(1.15);
    }
    input[type=range]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 3px rgba(240, 160, 48, 0.20), 0 0 10px var(--gold-glow);
    }

    .slider-val {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-mid);
      min-width: 3ch;
      text-align: right;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      padding: 7px 18px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s, background 0.15s;
    }
    button:active  { transform: scale(0.96); }
    button:disabled { opacity: 0.30; cursor: not-allowed; transform: none; }

    #btn-run {
      background: var(--gold);
      color: #0c0a06;
      font-weight: 700;
      box-shadow: 0 0 12px rgba(240, 160, 48, 0.30);
    }
    #btn-run:not(:disabled):hover {
      box-shadow: 0 0 24px var(--gold-glow), 0 0 6px var(--gold-glow);
    }

    #btn-step {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border: 1px solid var(--glass-border);
    }
    #btn-step:not(:disabled):hover {
      border-color: rgba(240, 160, 48, 0.35);
      color: var(--gold);
      box-shadow: 0 0 10px rgba(240, 160, 48, 0.12);
    }

    #btn-stop {
      background: rgba(255, 255, 255, 0.04);
      color: var(--pink);
      border: 1px solid rgba(236, 72, 153, 0.30);
    }
    #btn-stop:not(:disabled):hover {
      background: rgba(236, 72, 153, 0.12);
      box-shadow: 0 0 12px rgba(236, 72, 153, 0.25);
    }

    #btn-reset {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-dim);
      border: 1px solid var(--glass-border);
    }
    #btn-reset:not(:disabled):hover {
      color: var(--text-mid);
      border-color: rgba(255, 255, 255, 0.12);
    }

    /* ── Visualizer ── */
    #viz {
      flex: 1;
      display: flex;
      align-items: flex-end;
      padding: 12px 16px 0;
      gap: 1px;
      overflow: hidden;
      position: relative;
    }

    .bar {
      flex: 1;
      border-radius: 2px 2px 0 0;
      transition: background-color 0.08s;
      min-width: 2px;
      position: relative;
    }

    .bar.comparing {
      box-shadow:
        0 0 0 1px var(--cyan),
        0 0 16px var(--cyan-glow),
        0 0 32px rgba(34, 211, 238, 0.20);
      z-index: 2;
    }

    .bar.swapping {
      box-shadow:
        0 0 0 1px var(--pink),
        0 0 16px var(--pink-glow),
        0 0 32px rgba(236, 72, 153, 0.20);
      z-index: 3;
    }

    .bar.sorted {
      filter: brightness(1.2) saturate(1.1);
    }

    /* Status overlay */
    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-shadow:
        0 0 20px var(--gold-glow),
        0 0 50px rgba(240, 160, 48, 0.25);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #status.visible { opacity: 1; }

    /* ── Footer ── */
    #footer-info {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--glass-border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .legend-item:first-child { padding-left: 0; }
    .legend-item:last-child  { padding-right: 0; }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.cyan {
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan-glow);
    }

    .legend-dot.pink {
      background: var(--pink);
      box-shadow: 0 0 6px var(--pink-glow);
    }

    .legend-dot.blue-red {
      background: linear-gradient(90deg, hsl(240,75%,45%), hsl(0,85%,53%));
    }

    .legend-dot.gold {
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold-glow);
    }

    .legend-sep {
      width: 1px;
      height: 14px;
      background: var(--glass-border);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- Background canvas: grid lines + radial vignette -->
<canvas id="bg-canvas" aria-hidden="true"></canvas>

<header>
  <div class="logo" aria-label="SortVis">
    <span class="logo-sort">Sort</span><span class="logo-vis">Vis</span>
  </div>
  <div class="header-divider" aria-hidden="true"></div>
  <div id="algo-label">Bubble Sort</div>
  <div class="header-stats" role="status" aria-live="polite" aria-label="Sort statistics">
    <div class="stat-chip">
      <span class="stat-label">Comparisons</span>
      <span class="stat-value" id="cmp-count">0</span>
    </div>
    <div class="stat-chip">
      <span class="stat-label">Swaps</span>
      <span class="stat-value" id="swap-count">0</span>
    </div>
    <div class="stat-chip">
      <span class="stat-label">Array Size</span>
      <span class="stat-value" id="size-display">60</span>
    </div>
  </div>
</header>

<div class="controls" role="toolbar" aria-label="Sort controls">
  <div class="ctrl-group">
    <label for="algo-select">Algorithm</label>
    <div class="select-wrap">
      <select id="algo-select" aria-label="Select sorting algorithm">
        <option value="bubble">Bubble Sort</option>
        <option value="selection">Selection Sort</option>
        <option value="insertion">Insertion Sort</option>
        <option value="merge">Merge Sort</option>
        <option value="quick">Quick Sort</option>
        <option value="heap">Heap Sort</option>
        <option value="shell">Shell Sort</option>
        <option value="cocktail">Cocktail Shaker Sort</option>
        <option value="comb">Comb Sort</option>
        <option value="gnome">Gnome Sort</option>
        <option value="radix">Radix Sort (LSD)</option>
        <option value="counting">Counting Sort</option>
      </select>
    </div>
  </div>

  <div class="ctrl-group">
    <label for="size-slider">Array Size</label>
    <div class="slider-wrap">
      <input type="range" id="size-slider" min="10" max="200" value="60" aria-label="Array size" />
      <span class="slider-val" id="size-val">60</span>
    </div>
  </div>

  <div class="ctrl-group">
    <label for="speed-slider">Speed</label>
    <div class="slider-wrap">
      <input type="range" id="speed-slider" min="1" max="100" value="50" aria-label="Animation speed" />
      <span class="slider-val" id="speed-val">50</span>
    </div>
  </div>

  <div class="btn-group">
    <button id="btn-run"   aria-label="Run sort">Run</button>
    <button id="btn-step"  aria-label="Step through sort">Step</button>
    <button id="btn-stop"  aria-label="Stop sort" disabled>Stop</button>
    <button id="btn-reset" aria-label="Shuffle array">Shuffle</button>
  </div>
</div>

<div id="viz" role="img" aria-label="Sorting visualization">
  <div id="status" aria-live="assertive"></div>
</div>

<div id="footer-info" role="legend" aria-label="Visualization legend">
  <div class="legend-item">
    <span class="legend-dot cyan" aria-hidden="true"></span>
    Comparing
  </div>
  <div class="legend-sep" aria-hidden="true"></div>
  <div class="legend-item">
    <span class="legend-dot pink" aria-hidden="true"></span>
    Swapping
  </div>
  <div class="legend-sep" aria-hidden="true"></div>
  <div class="legend-item">
    <span class="legend-dot blue-red" aria-hidden="true"></span>
    Low &rarr; High value
  </div>
  <div class="legend-sep" aria-hidden="true"></div>
  <div class="legend-item">
    <span class="legend-dot gold" aria-hidden="true"></span>
    Sorted
  </div>
</div>

<script>
/* ── Background canvas: grid + radial vignette ── */
(function initBgCanvas() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  const GRID   = 48;

  function draw() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    canvas.width  = W;
    canvas.height = H;

    ctx.clearRect(0, 0, W, H);

    /* Grid lines */
    ctx.strokeStyle = 'rgba(255,255,255,0.018)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    for (let x = 0; x <= W; x += GRID) {
      ctx.moveTo(x + 0.5, 0);
      ctx.lineTo(x + 0.5, H);
    }
    for (let y = 0; y <= H; y += GRID) {
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(W, y + 0.5);
    }
    ctx.stroke();

    /* Radial vignette — darkens edges */
    const cx = W / 2;
    const cy = H / 2;
    const r  = Math.sqrt(cx * cx + cy * cy);
    const grad = ctx.createRadialGradient(cx, cy, r * 0.35, cx, cy, r);
    grad.addColorStop(0, 'rgba(6,6,9,0)');
    grad.addColorStop(1, 'rgba(6,6,9,0.82)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  draw();

  let resizeRaf;
  window.addEventListener('resize', () => {
    cancelAnimationFrame(resizeRaf);
    resizeRaf = requestAnimationFrame(draw);
  });
})();
</script>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   State
═══════════════════════════════════════════════════════ */
let array        = [];
let bars         = [];
let generator    = null;
let running      = false;
let rafId        = null;
let comparisons  = 0;
let swaps        = 0;
let highlighted  = { comparing: [], swapping: [] };
let sortedSet    = new Set();
let done         = false;
let vizHeight    = 0;

const viz        = document.getElementById('viz');
const statusEl   = document.getElementById('status');
const algoSelect = document.getElementById('algo-select');
const sizeSlider = document.getElementById('size-slider');
const speedSlider= document.getElementById('speed-slider');
const sizeVal    = document.getElementById('size-val');
const speedVal   = document.getElementById('speed-val');
const sizeDisp   = document.getElementById('size-display');
const algoLabel  = document.getElementById('algo-label');
const cmpCount   = document.getElementById('cmp-count');
const swapCount  = document.getElementById('swap-count');
const btnRun     = document.getElementById('btn-run');
const btnStep    = document.getElementById('btn-step');
const btnStop    = document.getElementById('btn-stop');
const btnReset   = document.getElementById('btn-reset');

/* ═══════════════════════════════════════════════════════
   Color map: value rank → HSL hue (240 blue → 0 red)
═══════════════════════════════════════════════════════ */
function rankColor(rank, total) {
  // rank 0 = smallest → hue 240 (blue), rank n-1 = largest → hue 0 (red)
  const t   = rank / (total - 1);
  const hue = 240 - t * 240;   // 240..0
  const sat = 75 + t * 10;     // slight saturation increase for reds
  const lit = 45 + t * 8;      // slightly brighter reds
  return `hsl(${hue.toFixed(1)},${sat.toFixed(0)}%,${lit.toFixed(0)}%)`;
}

/* Pre-compute rank → color for current array size */
let colorMap = [];

function buildColorMap(n) {
  colorMap = [];
  for (let i = 0; i < n; i++) colorMap.push(rankColor(i, n));
}

/* Array value → color (values are rank indices 1..n) */
function colorForValue(v) {
  return colorMap[v - 1] || '#888';
}

/* ═══════════════════════════════════════════════════════
   Array & DOM init
═══════════════════════════════════════════════════════ */
function buildArray(n) {
  array = Array.from({ length: n }, (_, i) => i + 1);
  shuffle(array);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildBars() {
  // Remove old bars (keep status overlay)
  [...viz.querySelectorAll('.bar')].forEach(b => b.remove());
  bars = [];
  const n = array.length;
  vizHeight = viz.clientHeight;

  for (let i = 0; i < n; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    viz.appendChild(bar);
    bars.push(bar);
  }
  renderBars();
}

function renderBars() {
  const n      = array.length;
  const maxVal = n; // values are 1..n

  for (let i = 0; i < n; i++) {
    const bar = bars[i];
    const v   = array[i];
    const heightPx = Math.max(2, Math.round((v / maxVal) * (vizHeight - 4)));

    bar.style.height          = heightPx + 'px';
    bar.style.backgroundColor = colorForValue(v);

    // Reset classes
    bar.className = 'bar';
  }

  // Apply highlights
  for (const idx of highlighted.comparing) {
    if (bars[idx]) bars[idx].classList.add('comparing');
  }
  for (const idx of highlighted.swapping) {
    if (bars[idx]) bars[idx].classList.add('swapping');
  }
  // Sorted
  for (const idx of sortedSet) {
    if (bars[idx]) bars[idx].classList.add('sorted');
  }
}

function resetCounters() {
  comparisons = 0;
  swaps       = 0;
  cmpCount.textContent  = '0';
  swapCount.textContent = '0';
  highlighted = { comparing: [], swapping: [] };
  sortedSet   = new Set();
  done        = false;
  hideStatus();
}

function updateCounters() {
  cmpCount.textContent  = comparisons.toLocaleString();
  swapCount.textContent = swaps.toLocaleString();
}

function showStatus(msg, color = 'var(--gold)') {
  statusEl.textContent = msg;
  statusEl.style.color = color;
  statusEl.classList.add('visible');
}
function hideStatus() {
  statusEl.classList.remove('visible');
}

/* ═══════════════════════════════════════════════════════
   Generator yield protocol
   Each yield is an object: { type, indices, extra? }
   type: 'compare' | 'swap' | 'overwrite' | 'sorted' | 'done'
═══════════════════════════════════════════════════════ */

/* ─── Bubble Sort ─── */
function* bubbleSort(arr) {
  const n = arr.length;
  for (let i = 0; i < n - 1; i++) {
    for (let j = 0; j < n - i - 1; j++) {
      yield { type: 'compare', indices: [j, j + 1] };
      comparisons++;
      updateCounters();
      if (arr[j] > arr[j + 1]) {
        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
        swaps++;
        updateCounters();
        yield { type: 'swap', indices: [j, j + 1] };
      }
    }
    sortedSet.add(n - 1 - i);
    yield { type: 'sorted', indices: [n - 1 - i] };
  }
  sortedSet.add(0);
  yield { type: 'done' };
}

/* ─── Selection Sort ─── */
function* selectionSort(arr) {
  const n = arr.length;
  for (let i = 0; i < n - 1; i++) {
    let minIdx = i;
    for (let j = i + 1; j < n; j++) {
      yield { type: 'compare', indices: [minIdx, j] };
      comparisons++;
      updateCounters();
      if (arr[j] < arr[minIdx]) minIdx = j;
    }
    if (minIdx !== i) {
      [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
      swaps++;
      updateCounters();
      yield { type: 'swap', indices: [i, minIdx] };
    }
    sortedSet.add(i);
    yield { type: 'sorted', indices: [i] };
  }
  sortedSet.add(n - 1);
  yield { type: 'done' };
}

/* ─── Insertion Sort ─── */
function* insertionSort(arr) {
  const n = arr.length;
  sortedSet.add(0);
  for (let i = 1; i < n; i++) {
    const key = arr[i];
    let j = i - 1;
    yield { type: 'compare', indices: [i, j] };
    comparisons++;
    updateCounters();
    while (j >= 0 && arr[j] > key) {
      arr[j + 1] = arr[j];
      swaps++;
      updateCounters();
      yield { type: 'swap', indices: [j + 1, j] };
      j--;
      if (j >= 0) {
        yield { type: 'compare', indices: [j + 1, j] };
        comparisons++;
        updateCounters();
      }
    }
    arr[j + 1] = key;
    sortedSet.add(i);
    yield { type: 'sorted', indices: [i] };
  }
  yield { type: 'done' };
}

/* ─── Merge Sort ─── */
function* mergeSort(arr) {
  yield* mergeSortHelper(arr, 0, arr.length - 1);
  for (let i = 0; i < arr.length; i++) sortedSet.add(i);
  yield { type: 'done' };
}

function* mergeSortHelper(arr, l, r) {
  if (l >= r) return;
  const m = (l + r) >> 1;
  yield* mergeSortHelper(arr, l, m);
  yield* mergeSortHelper(arr, m + 1, r);
  yield* merge(arr, l, m, r);
}

function* merge(arr, l, m, r) {
  const left  = arr.slice(l, m + 1);
  const right = arr.slice(m + 1, r + 1);
  let i = 0, j = 0, k = l;

  while (i < left.length && j < right.length) {
    yield { type: 'compare', indices: [l + i, m + 1 + j] };
    comparisons++;
    updateCounters();
    if (left[i] <= right[j]) {
      arr[k] = left[i++];
    } else {
      arr[k] = right[j++];
    }
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [k] };
    k++;
  }
  while (i < left.length) {
    arr[k] = left[i++];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [k++] };
  }
  while (j < right.length) {
    arr[k] = right[j++];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [k++] };
  }
  for (let x = l; x <= r; x++) sortedSet.add(x);
}

/* ─── Quick Sort ─── */
function* quickSort(arr) {
  yield* quickSortHelper(arr, 0, arr.length - 1);
  for (let i = 0; i < arr.length; i++) sortedSet.add(i);
  yield { type: 'done' };
}

function* quickSortHelper(arr, lo, hi) {
  if (lo >= hi) { if (lo === hi) sortedSet.add(lo); return; }
  yield* partition(arr, lo, hi);
}

function* partition(arr, lo, hi) {
  // Median-of-three pivot
  const mid = (lo + hi) >> 1;
  yield { type: 'compare', indices: [lo, mid] };
  comparisons++;
  updateCounters();
  if (arr[lo] > arr[mid]) { [arr[lo], arr[mid]] = [arr[mid], arr[lo]]; swaps++; updateCounters(); yield { type: 'swap', indices: [lo, mid] }; }
  yield { type: 'compare', indices: [lo, hi] };
  comparisons++;
  updateCounters();
  if (arr[lo] > arr[hi])  { [arr[lo], arr[hi]]  = [arr[hi],  arr[lo]]; swaps++; updateCounters(); yield { type: 'swap', indices: [lo, hi] }; }
  yield { type: 'compare', indices: [mid, hi] };
  comparisons++;
  updateCounters();
  if (arr[mid] > arr[hi]) { [arr[mid], arr[hi]] = [arr[hi], arr[mid]]; swaps++; updateCounters(); yield { type: 'swap', indices: [mid, hi] }; }

  const pivot = arr[mid];
  [arr[mid], arr[hi - 1]] = [arr[hi - 1], arr[mid]];
  swaps++; updateCounters();
  yield { type: 'swap', indices: [mid, hi - 1] };

  let i = lo, j = hi - 1;
  while (true) {
    do {
      i++;
      yield { type: 'compare', indices: [i, hi - 1] };
      comparisons++;
      updateCounters();
    } while (arr[i] < pivot);
    do {
      j--;
      yield { type: 'compare', indices: [j, hi - 1] };
      comparisons++;
      updateCounters();
    } while (j > lo && arr[j] > pivot);
    if (i >= j) break;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [i, j] };
  }
  [arr[i], arr[hi - 1]] = [arr[hi - 1], arr[i]];
  swaps++;
  updateCounters();
  yield { type: 'swap', indices: [i, hi - 1] };

  const p = i;
  sortedSet.add(p);
  yield* quickSortHelper(arr, lo, p - 1);
  yield* quickSortHelper(arr, p + 1, hi);
}

/* ─── Heap Sort ─── */
function* heapSort(arr) {
  const n = arr.length;

  // Build max heap
  for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
    yield* heapify(arr, n, i);
  }

  for (let i = n - 1; i > 0; i--) {
    [arr[0], arr[i]] = [arr[i], arr[0]];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [0, i] };
    sortedSet.add(i);
    yield { type: 'sorted', indices: [i] };
    yield* heapify(arr, i, 0);
  }
  sortedSet.add(0);
  yield { type: 'done' };
}

function* heapify(arr, n, i) {
  let largest = i;
  const l = 2 * i + 1;
  const r = 2 * i + 2;

  if (l < n) {
    yield { type: 'compare', indices: [l, largest] };
    comparisons++;
    updateCounters();
    if (arr[l] > arr[largest]) largest = l;
  }
  if (r < n) {
    yield { type: 'compare', indices: [r, largest] };
    comparisons++;
    updateCounters();
    if (arr[r] > arr[largest]) largest = r;
  }
  if (largest !== i) {
    [arr[i], arr[largest]] = [arr[largest], arr[i]];
    swaps++;
    updateCounters();
    yield { type: 'swap', indices: [i, largest] };
    yield* heapify(arr, n, largest);
  }
}

/* ─── Shell Sort ─── */
function* shellSort(arr) {
  const n = arr.length;
  for (let gap = Math.floor(n / 2); gap > 0; gap = Math.floor(gap / 2)) {
    for (let i = gap; i < n; i++) {
      const temp = arr[i];
      let j = i;
      yield { type: 'compare', indices: [j, j - gap] };
      comparisons++;
      updateCounters();
      while (j >= gap && arr[j - gap] > temp) {
        arr[j] = arr[j - gap];
        swaps++;
        updateCounters();
        yield { type: 'swap', indices: [j, j - gap] };
        j -= gap;
        if (j >= gap) {
          yield { type: 'compare', indices: [j, j - gap] };
          comparisons++;
          updateCounters();
        }
      }
      arr[j] = temp;
    }
  }
  for (let i = 0; i < n; i++) sortedSet.add(i);
  yield { type: 'done' };
}

/* ─── Cocktail Shaker Sort ─── */
function* cocktailSort(arr) {
  const n = arr.length;
  let start = 0, end = n - 1, swapped = true;
  while (swapped) {
    swapped = false;
    for (let i = start; i < end; i++) {
      yield { type: 'compare', indices: [i, i + 1] };
      comparisons++;
      updateCounters();
      if (arr[i] > arr[i + 1]) {
        [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]];
        swaps++;
        updateCounters();
        yield { type: 'swap', indices: [i, i + 1] };
        swapped = true;
      }
    }
    sortedSet.add(end);
    end--;
    if (!swapped) break;
    swapped = false;
    for (let i = end; i > start; i--) {
      yield { type: 'compare', indices: [i, i - 1] };
      comparisons++;
      updateCounters();
      if (arr[i] < arr[i - 1]) {
        [arr[i], arr[i - 1]] = [arr[i - 1], arr[i]];
        swaps++;
        updateCounters();
        yield { type: 'swap', indices: [i, i - 1] };
        swapped = true;
      }
    }
    sortedSet.add(start);
    start++;
  }
  for (let i = 0; i < n; i++) sortedSet.add(i);
  yield { type: 'done' };
}

/* ─── Comb Sort ─── */
function* combSort(arr) {
  const n = arr.length;
  let gap = n;
  const shrink = 1.3;
  let sorted = false;
  while (!sorted) {
    gap = Math.floor(gap / shrink);
    if (gap <= 1) { gap = 1; sorted = true; }
    for (let i = 0; i + gap < n; i++) {
      yield { type: 'compare', indices: [i, i + gap] };
      comparisons++;
      updateCounters();
      if (arr[i] > arr[i + gap]) {
        [arr[i], arr[i + gap]] = [arr[i + gap], arr[i]];
        swaps++;
        updateCounters();
        yield { type: 'swap', indices: [i, i + gap] };
        sorted = false;
      }
    }
  }
  for (let i = 0; i < n; i++) sortedSet.add(i);
  yield { type: 'done' };
}

/* ─── Gnome Sort ─── */
function* gnomeSort(arr) {
  const n = arr.length;
  let i = 1;
  while (i < n) {
    if (i === 0) { i++; continue; }
    yield { type: 'compare', indices: [i, i - 1] };
    comparisons++;
    updateCounters();
    if (arr[i] >= arr[i - 1]) {
      i++;
    } else {
      [arr[i], arr[i - 1]] = [arr[i - 1], arr[i]];
      swaps++;
      updateCounters();
      yield { type: 'swap', indices: [i, i - 1] };
      i--;
    }
  }
  for (let j = 0; j < n; j++) sortedSet.add(j);
  yield { type: 'done' };
}

/* ─── Radix Sort (LSD) ─── */
function* radixSort(arr) {
  const n = arr.length;
  const max = Math.max(...arr);
  for (let exp = 1; Math.floor(max / exp) > 0; exp *= 10) {
    const output = new Array(n);
    const count = new Array(10).fill(0);
    // Count occurrences
    for (let i = 0; i < n; i++) {
      const digit = Math.floor(arr[i] / exp) % 10;
      count[digit]++;
      yield { type: 'compare', indices: [i] };
      comparisons++;
      updateCounters();
    }
    // Cumulative count
    for (let i = 1; i < 10; i++) count[i] += count[i - 1];
    // Build output (stable, right to left)
    for (let i = n - 1; i >= 0; i--) {
      const digit = Math.floor(arr[i] / exp) % 10;
      output[count[digit] - 1] = arr[i];
      count[digit]--;
    }
    // Copy back
    for (let i = 0; i < n; i++) {
      arr[i] = output[i];
      swaps++;
      updateCounters();
      yield { type: 'swap', indices: [i] };
    }
  }
  for (let i = 0; i < n; i++) sortedSet.add(i);
  yield { type: 'done' };
}

/* ─── Counting Sort ─── */
function* countingSort(arr) {
  const n = arr.length;
  const max = Math.max(...arr);
  const count = new Array(max + 1).fill(0);
  // Count
  for (let i = 0; i < n; i++) {
    count[arr[i]]++;
    yield { type: 'compare', indices: [i] };
    comparisons++;
    updateCounters();
  }
  // Rebuild
  let idx = 0;
  for (let v = 0; v <= max; v++) {
    while (count[v]-- > 0) {
      arr[idx] = v;
      swaps++;
      updateCounters();
      yield { type: 'swap', indices: [idx] };
      idx++;
    }
  }
  for (let i = 0; i < n; i++) sortedSet.add(i);
  yield { type: 'done' };
}

/* ═══════════════════════════════════════════════════════
   Generator map
═══════════════════════════════════════════════════════ */
const ALGOS = {
  bubble:    { name: 'Bubble Sort',          fn: bubbleSort    },
  selection: { name: 'Selection Sort',       fn: selectionSort },
  insertion: { name: 'Insertion Sort',       fn: insertionSort },
  merge:     { name: 'Merge Sort',           fn: mergeSort     },
  quick:     { name: 'Quick Sort',           fn: quickSort     },
  heap:      { name: 'Heap Sort',            fn: heapSort      },
  shell:     { name: 'Shell Sort',           fn: shellSort     },
  cocktail:  { name: 'Cocktail Shaker Sort', fn: cocktailSort  },
  comb:      { name: 'Comb Sort',            fn: combSort      },
  gnome:     { name: 'Gnome Sort',           fn: gnomeSort     },
  radix:     { name: 'Radix Sort (LSD)',     fn: radixSort     },
  counting:  { name: 'Counting Sort',        fn: countingSort  },
};

/* ═══════════════════════════════════════════════════════
   Runner
═══════════════════════════════════════════════════════ */
function getDelay() {
  // speed 1 → ~500ms, speed 100 → ~0ms (rAF)
  const s = parseInt(speedSlider.value, 10);
  if (s >= 99) return 0;
  // Exponential: fast at high end
  return Math.round(500 * Math.pow(1 - s / 100, 2.2));
}

function applyStep(result) {
  if (!result || result.done) {
    finishSort();
    return false;
  }

  const { type, indices } = result.value;
  highlighted = { comparing: [], swapping: [] };

  switch (type) {
    case 'compare':
      highlighted.comparing = indices;
      break;
    case 'swap':
      highlighted.swapping = indices;
      break;
    case 'sorted':
      // indices already added to sortedSet by algorithm
      break;
    case 'done':
      finishSort();
      return false;
  }

  renderBars();
  return true;
}

function stepOnce() {
  if (!generator || done) return;
  const result = generator.next();
  return applyStep(result);
}

function finishSort() {
  running = false;
  done    = true;
  if (rafId) { clearTimeout(rafId); rafId = null; }
  highlighted = { comparing: [], swapping: [] };
  // Mark all as sorted
  for (let i = 0; i < array.length; i++) sortedSet.add(i);
  renderBars();
  showStatus('Sorted!', 'var(--gold)');
  setUIState('done');
}

function runLoop() {
  if (!running) return;
  const more = stepOnce();
  if (more === false) return;
  const delay = getDelay();
  if (delay === 0) {
    rafId = requestAnimationFrame(runLoop);
  } else {
    rafId = setTimeout(runLoop, delay);
  }
}

function startRun() {
  if (done) resetAndInit();
  if (!generator) initGenerator();
  running = true;
  setUIState('running');
  runLoop();
}

function stopRun() {
  running = false;
  if (rafId) { clearTimeout(rafId); cancelAnimationFrame(rafId); rafId = null; }
  setUIState('paused');
}

function initGenerator() {
  const key = algoSelect.value;
  generator  = ALGOS[key].fn(array);
}

function resetAndInit() {
  stopRun();
  resetCounters();
  const n = parseInt(sizeSlider.value, 10);
  buildColorMap(n);
  buildArray(n);
  buildBars();
  generator = null;
  setUIState('idle');
}

/* ═══════════════════════════════════════════════════════
   UI state
═══════════════════════════════════════════════════════ */
function setUIState(state) {
  // states: idle | running | paused | done
  btnRun.disabled   = (state === 'running');
  btnStep.disabled  = (state === 'running' || state === 'done');
  btnStop.disabled  = (state !== 'running');
  btnReset.disabled = false;
}

/* ═══════════════════════════════════════════════════════
   Event listeners
═══════════════════════════════════════════════════════ */
btnRun.addEventListener('click', () => {
  if (done) resetAndInit();
  startRun();
});

btnStep.addEventListener('click', () => {
  if (done) return;
  if (!generator) { initGenerator(); setUIState('paused'); }
  const more = stepOnce();
  if (more === false) return;
  setUIState('paused');
});

btnStop.addEventListener('click', stopRun);

btnReset.addEventListener('click', resetAndInit);

algoSelect.addEventListener('change', () => {
  algoLabel.textContent = ALGOS[algoSelect.value].name;
  resetAndInit();
});

sizeSlider.addEventListener('input', () => {
  const n = parseInt(sizeSlider.value, 10);
  sizeVal.textContent  = n;
  sizeDisp.textContent = n;
  resetAndInit();
});

speedSlider.addEventListener('input', () => {
  speedVal.textContent = speedSlider.value;
});

/* Resize: rebuild bars to fit new height */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    vizHeight = viz.clientHeight;
    renderBars();
  }, 60);
});

/* ═══════════════════════════════════════════════════════
   Boot
═══════════════════════════════════════════════════════ */
(function init() {
  const n = parseInt(sizeSlider.value, 10);
  sizeVal.textContent  = n;
  speedVal.textContent = speedSlider.value;
  sizeDisp.textContent = n;
  algoLabel.textContent = ALGOS[algoSelect.value].name;
  buildColorMap(n);
  buildArray(n);

  // Wait one frame so viz has its layout height
  requestAnimationFrame(() => {
    buildBars();
    setUIState('idle');
  });
})();
</script>
</body>
